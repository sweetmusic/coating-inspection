<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f2744">
<title>도장 품질점검</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2744;--navy2:#1a3a5c;--navy3:#2c5282;
  --accent:#e8a020;--accent2:#f5c842;
  --ok:#2ecc71;--ok-bg:#eafaf1;
  --ng:#e74c3c;--ng-bg:#fdecea;
  --mid:#f39c12;--mid-bg:#fef9e7;
  --bg:#f0f4f8;--card:#fff;--border:#d1dce8;
  --text:#1a2a3a;--text2:#5a7a9a;
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none;}
.hidden{display:none!important;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* 앱 레이아웃 */
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--card);box-shadow:0 0 40px rgba(0,0,0,.12);overflow:hidden;}

/* 헤더 */
.hdr{background:var(--navy);padding:14px 16px 12px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.hdr-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;}
.hdr-ver{font-family:"JetBrains Mono",monospace;font-size:10px;color:rgba(255,255,255,.4);}
.hdr-sub{font-size:16px;font-weight:700;color:#fff;}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.back-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;padding:0 10px 0 0;line-height:1;}

/* 진행 바 */
.prog{background:var(--navy);padding:8px 16px 12px;flex-shrink:0;}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px;}
.prog-bg{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s;}
.prog-scores{display:flex;justify-content:space-between;margin-top:6px;}
.chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:"JetBrains Mono",monospace;}
.chip-cur{background:rgba(255,255,255,.15);color:var(--accent2);}
.chip-grade{color:#fff;}
.g-A{background:#1e8449}.g-B{background:#d68910}.g-C{background:#c0392b}.g-none{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);}

/* 스크롤 영역 */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:90px;min-height:0;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* 하단 버튼 */
.btm{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px 14px;display:flex;gap:8px;}
.btn{flex:1;padding:13px 8px;border:none;border-radius:var(--r);font-family:"Noto Sans KR",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;pointer-events:none;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-gray{background:var(--bg);color:var(--navy);border:1.5px solid var(--border);}
.btn-accent{background:var(--accent);color:var(--navy);font-weight:700;}
.btn-ok{background:var(--ok);color:#fff;}

/* 로딩 화면 */
#sc-load{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;background:var(--navy);}
.load-ico{font-size:44px;animation:pulse 1.5s infinite;}
.load-title{font-size:20px;font-weight:700;color:#fff;}
.load-msg{font-size:13px;color:rgba(255,255,255,.5);}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.load-err{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.4);border-radius:var(--r);padding:12px 16px;font-size:12px;color:#ff8a80;text-align:center;max-width:280px;line-height:1.6;white-space:pre-line;}
.btn-file{padding:10px 24px;background:var(--accent);color:var(--navy);border:none;border-radius:var(--r);font-weight:700;font-size:13px;cursor:pointer;margin-top:4px;}

/* 정보입력 화면 */
#sc-info{display:flex;flex-direction:column;height:100%;}
.info-body{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.fld{margin-bottom:18px;}
.fld-label{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.req{color:var(--ng);font-size:14px;line-height:1;}
.fld-input,.fld-sel{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:"Noto Sans KR",sans-serif;font-size:14px;color:var(--text);background:var(--card);outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none;}
.fld-input:focus,.fld-sel:focus{border-color:var(--navy3);box-shadow:0 0 0 3px rgba(44,82,130,.12);}
.sel-wrap{position:relative;}
.sel-wrap::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;}
.type-grp{display:flex;gap:8px;}
.type-btn{flex:1;padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);font-family:"Noto Sans KR",sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s;}
.type-btn.on{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:700;}

/* 점검 화면 */
#sc-check{display:flex;flex-direction:column;height:100%;}
.tabs{display:flex;overflow-x:auto;background:var(--navy);scrollbar-width:none;padding:0 8px;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:10px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;position:relative;}
.tab.on{color:var(--accent2);border-bottom-color:var(--accent);}
.tab .dot{position:absolute;top:6px;right:4px;width:7px;height:7px;background:var(--ng);border-radius:50%;display:none;}
.tab.ng .dot{display:block;}
.tab.done::after{content:"✓";position:absolute;top:5px;right:4px;font-size:8px;color:var(--ok);}

/* 중분류 섹션 */
.mid-sec{margin:12px 12px 0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--card);box-shadow:0 2px 8px rgba(15,39,68,.08);}
.mid-hdr{padding:11px 14px;background:var(--navy);display:flex;align-items:flex-start;gap:8px;}
.mid-num{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;color:var(--accent);background:rgba(232,160,32,.15);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.mid-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);line-height:1.45;}

/* 세부항목 */
.sub{border-bottom:1px solid var(--border);}
.sub:last-child{border-bottom:none;}
.sub-num{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--text2);padding:10px 14px 4px;font-weight:500;}
.opts{padding:0 10px 10px;display:flex;flex-direction:column;gap:5px;}
.opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;background:var(--bg);cursor:pointer;width:100%;transition:all .15s;}
.opt:active{transform:scale(.98);}
.opt-radio{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.opt-radio::after{content:"";width:8px;height:8px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s;}
.opt-text{flex:1;font-size:12px;font-weight:500;color:var(--text);line-height:1.4;}
.opt-score{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:var(--border);color:var(--text2);flex-shrink:0;}
/* 선택 상태 */
.opt.ok{border-color:var(--ok);background:var(--ok-bg);}
.opt.ok .opt-radio{border-color:var(--ok);background:var(--ok);}
.opt.ok .opt-radio::after{opacity:1;}
.opt.ok .opt-text{color:#1a5c35;font-weight:600;}
.opt.ok .opt-score{background:var(--ok);color:#fff;}
.opt.ng{border-color:var(--ng);background:var(--ng-bg);}
.opt.ng .opt-radio{border-color:var(--ng);background:var(--ng);}
.opt.ng .opt-radio::after{opacity:1;}
.opt.ng .opt-text{color:#7b1a12;font-weight:600;}
.opt.ng .opt-score{background:var(--ng);color:#fff;}
.opt.mid{border-color:var(--mid);background:var(--mid-bg);}
.opt.mid .opt-radio{border-color:var(--mid);background:var(--mid);}
.opt.mid .opt-radio::after{opacity:1;}
.opt.mid .opt-text{color:#7d4e00;font-weight:600;}
.opt.mid .opt-score{background:var(--mid);color:#fff;}
/* 비고 */
.memo-wrap{margin:0 10px 10px;}
.memo{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:"Noto Sans KR",sans-serif;font-size:12px;color:var(--text);background:var(--bg);resize:none;outline:none;min-height:48px;}
.memo:focus{border-color:var(--navy3);background:#fff;}

/* 결과 화면 */
#sc-result{display:flex;flex-direction:column;height:100%;}
.result-hero{background:var(--navy);padding:24px 16px 20px;text-align:center;}
.r-co{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:8px;}
.r-score{font-family:"JetBrains Mono",monospace;font-size:52px;font-weight:700;color:var(--accent2);line-height:1;}
.r-raw{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px;}
.r-badge{display:inline-block;margin-top:10px;padding:6px 20px;border-radius:20px;font-size:15px;font-weight:700;color:#fff;}
.r-note{font-size:11px;color:rgba(255,255,255,.5);margin-top:6px;}
.r-sec{margin:12px 12px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 8px rgba(15,39,68,.08);}
.r-sec-title{padding:10px 14px;font-size:12px;font-weight:700;color:var(--navy);background:var(--bg);border-bottom:1px solid var(--border);}
.r-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
.r-row:last-child{border-bottom:none;}
.r-row-name{font-size:12px;flex:1;}
.r-bar-wrap{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 10px;}
.r-bar{height:100%;border-radius:3px;}
.r-row-score{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;min-width:44px;text-align:right;}
.ng-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:flex-start;}
.ng-item:last-child{border-bottom:none;}
.ng-tag{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;background:var(--ng-bg);color:var(--ng);border:1px solid rgba(231,76,60,.25);padding:2px 7px;border-radius:5px;flex-shrink:0;}
.ng-txt{font-size:12px;line-height:1.45;}
.ng-memo{font-size:11px;color:var(--text2);margin-top:2px;}
.miss-item{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.miss-item:last-child{border-bottom:none;}
.miss-item:active{background:var(--mid-bg);}
.miss-dot{width:7px;height:7px;border-radius:50%;background:var(--mid);flex-shrink:0;}
.miss-txt{font-size:12px;color:var(--text2);flex:1;}
.miss-arr{font-size:13px;color:var(--mid);font-weight:700;}

/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 34px;width:100%;max-width:480px;animation:slideUp .25s ease;}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.sheet-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.sheet-btns{display:flex;flex-direction:column;gap:8px;}

/* 저장 인디케이터 */
.save-ind{position:fixed;bottom:76px;right:12px;background:rgba(46,204,113,.92);color:#fff;font-size:10px;padding:4px 10px;border-radius:12px;z-index:50;pointer-events:none;font-family:"JetBrains Mono",monospace;animation:fadeIn .2s ease;}

/* 카카오 배너 */
.kakao-banner{background:var(--accent);color:var(--navy);padding:12px 40px 12px 16px;font-size:12px;font-weight:600;line-height:1.5;position:relative;flex-shrink:0;}
.kakao-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--navy);}
</style>
</head>
<body>
<div id="app">

<!-- 로딩 -->
<div id="sc-load">
  <div class="load-ico">🎨</div>
  <div class="load-title">도장 품질점검</div>
  <div class="load-msg" id="load-msg">설정 파일 확인 중...</div>
  <div class="spinner" id="load-spin"></div>
  <div class="load-err hidden" id="load-err"></div>
  <button class="btn-file hidden" id="btn-file" onclick="triggerFile()">📁 설정 파일 직접 불러오기</button>
  <input type="file" id="file-input" accept=".json" class="hidden" onchange="onFileLoad(event)">
</div>

<!-- 기본정보 -->
<div id="sc-info" class="hidden">
  <div class="hdr">
    <div class="hdr-top">
      <span class="hdr-title">🎨 도장 품질점검</span>
      <span class="hdr-ver" id="info-ver"></span>
    </div>
    <div class="hdr-sub">기본 정보 입력</div>
    <div class="hdr-meta" id="info-upd"></div>
  </div>
  <div class="info-body">
    <div class="fld">
      <div class="fld-label">협력사 <span class="req">*</span></div>
      <div class="sel-wrap">
        <select id="sel-co" class="fld-sel">
          <option value="">-- 협력사를 선택하세요 --</option>
        </select>
      </div>
    </div>
    <div class="fld">
      <div class="fld-label">점검일자 <span class="req">*</span></div>
      <input type="date" id="inp-date" class="fld-input">
    </div>
    <div class="fld">
      <div class="fld-label">점검유형 <span class="req">*</span></div>
      <div class="type-grp">
        <button class="type-btn on" data-t="정기" onclick="setType(this)">📋 정기 기본품질점검</button>
        <button class="type-btn" data-t="상하반기" onclick="setType(this)">📊 상/하반기 종합평가</button>
      </div>
    </div>
    <div class="fld">
      <div class="fld-label">점검자 <span class="req">*</span></div>
      <input type="text" id="inp-insp" class="fld-input" placeholder="점검자 이름 입력" autocomplete="off">
    </div>
  </div>
  <div class="btm">
    <button class="btn btn-gray" onclick="openModal('modal-cfg')">⚙ 설정</button>
    <button class="btn btn-navy" onclick="startCheck()" style="flex:2">점검 시작 →</button>
  </div>
</div>

<!-- 점검 입력 -->
<div id="sc-check" class="hidden">
  <div class="hdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="goBack()">‹</button>
      <span class="hdr-title" id="chk-co"></span>
      <span class="hdr-ver" id="chk-date"></span>
    </div>
    <div class="hdr-sub" id="chk-major"></div>
  </div>
  <div class="prog">
    <div class="prog-label">
      <span id="prog-txt">0 / 0 항목 완료</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-scores">
      <span class="chip chip-cur" id="chip-score">0/0점</span>
      <span class="chip chip-grade g-none" id="chip-grade">입력 중</span>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="scroll" id="chk-body"></div>
  <div class="btm">
    <button class="btn btn-gray" id="btn-prev" onclick="prevMaj()">‹ 이전</button>
    <button class="btn btn-navy" id="btn-next" onclick="nextMaj()" style="flex:2">다음 ›</button>
  </div>
</div>

<!-- 결과 요약 -->
<div id="sc-result" class="hidden">
  <div class="hdr">
    <div class="hdr-top">
      <button class="back-btn" onclick="showScreen('sc-check')">‹</button>
      <span class="hdr-title">점검 결과 요약</span>
      <span class="hdr-ver" id="res-date"></span>
    </div>
  </div>
  <div class="scroll" id="res-body"></div>
  <div class="btm">
    <button class="btn btn-gray" onclick="showScreen('sc-check')">‹ 수정</button>
    <button class="btn btn-accent" onclick="openModal('modal-exp')" style="flex:2">📊 Excel + 메일 발송</button>
  </div>
</div>

</div><!-- #app -->

<!-- 모달: 설정 -->
<div id="modal-cfg" class="overlay hidden" onclick="if(event.target===this)closeModal('modal-cfg')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙ 설정 파일 업데이트</div>
    <div class="sheet-desc">협력사 목록·점검항목을 최신으로 업데이트합니다.</div>
    <div class="sheet-btns">
      <button class="btn btn-navy" onclick="closeModal('modal-cfg');triggerFile()">📁 파일에서 불러오기</button>
      <button class="btn btn-gray" onclick="closeModal('modal-cfg');loadGitHub()">🌐 GitHub 자동 로드</button>
      <button class="btn btn-gray" onclick="closeModal('modal-cfg')">취소</button>
    </div>
  </div>
</div>

<!-- 모달: 내보내기 -->
<div id="modal-exp" class="overlay hidden" onclick="if(event.target===this)closeModal('modal-exp')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📊 결과 저장 및 발송</div>
    <div class="sheet-desc" id="exp-desc"></div>
    <div class="sheet-btns">
      <button class="btn btn-ok" onclick="doExcel()">📥 Excel 다운로드</button>
      <button class="btn btn-navy" onclick="doMail()">✉ 메일 앱 열기</button>
      <button class="btn btn-gray" onclick="closeModal('modal-exp')">닫기</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ════ 설정 ════ */
const GH_URL   = 'https://sweetmusic.github.io/coating-inspection/app_config.json';
const CFG_KEY  = 'app_config';
const DRAFT_KEY= 'inspection_draft';

/* ════ 전역 상태 ════ */
let CFG = null;
let S = { company:null, date:'', type:'정기', inspector:'', majIdx:0, ans:{} };

/* ════ 초기화 ════ */
window.addEventListener('DOMContentLoaded', () => {
  if(isKakao()) showKakaoBanner();
  const cached = localStorage.getItem(CFG_KEY);
  if(cached){
    try{ CFG=JSON.parse(cached); boot(); return; }catch(e){ localStorage.removeItem(CFG_KEY); }
  }
  loadGitHub();
});

/* ════ 설정 로드 ════ */
async function loadGitHub(){
  showLoad('최신 설정을 불러오는 중...');
  try{
    const r = await fetch(GH_URL+'?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    CFG = await r.json();
    localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
    boot();
  }catch(e){
    showErr('설정 파일 자동 로드 실패

'+e.message+'

아래 버튼으로 직접 불러오기를 이용해 주세요.');
  }
}
function triggerFile(){ document.getElementById('file-input').click(); }
function onFileLoad(ev){
  const f = ev.target.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = e => {
    try{
      CFG = JSON.parse(e.target.result);
      localStorage.setItem(CFG_KEY, JSON.stringify(CFG));
      boot();
    }catch(err){ alert('파일 오류: 올바른 app_config.json 파일인지 확인해 주세요.'); }
  };
  fr.readAsText(f,'utf-8');
  ev.target.value='';
}

  document.getElementById('load-spin').style.display='block';
  document.getElementById('load-err').classList.add('hidden');
  document.getElementById('btn-file').classList.add('hidden');

function showErr(msg){

/* ════ 탭 ════ */
function buildTabs(){
  const el=document.getElementById('tabs'); el.innerHTML='';

/* ════ 점검 렌더 ════ */
function renderMaj(idx){
  S.majIdx=idx;
  const maj=CFG.checklist[idx];
  // 탭 활성화
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===idx));
  document.getElementById('chk-co').textContent=S.company.name;
  document.getElementById('chk-date').textContent=S.date.replace(/-/g,'.');
  document.getElementById('chk-major').textContent=maj.id+'. '+maj.name;
  // 버튼
  const isLast=idx===CFG.checklist.length-1;
  document.getElementById('btn-prev').disabled=(idx===0);
  const nb=document.getElementById('btn-next');
  nb.textContent=isLast?'✅ 결과 보기':'다음 ›';
  nb.className=isLast?'btn btn-accent':'btn btn-navy';
  // 콘텐츠
  const body=document.getElementById('chk-body'); body.innerHTML='';
  maj.items.forEach(item=>{
    const sec=document.createElement('div'); sec.className='mid-sec';
    sec.innerHTML='<div class="mid-hdr"><span class="mid-num">'+item.id+'</span><span class="mid-name">'+item.name+'</span></div>';
    item.subs.forEach(sub=>{
      // 정기점검 시 1-1-1 숨김
      if(sub.id==='1-1-1'&&S.type==='정기') return;
      const subEl=document.createElement('div'); subEl.className='sub'; subEl.id='sub-'+sub.id;
      const maxSc=Math.max(...sub.options.map(o=>o.score));
      // 세부번호
      subEl.innerHTML='<div class="sub-num">'+sub.id+'</div>';
      // 선택지
      const optsEl=document.createElement('div'); optsEl.className='opts';
      sub.options.forEach((opt,oi)=>{
        const saved=S.ans[sub.id];
        const isSel=saved&&saved.optionIdx===oi;
        const cls=isSel?' '+optCls(opt.score,maxSc):'';
        const btn=document.createElement('button');
        btn.className='opt'+cls;
        btn.id='opt-'+sub.id+'-'+oi;
        btn.innerHTML='<div class="opt-radio"></div><div class="opt-text">'+opt.text+'</div><div class="opt-score">'+opt.score+'점</div>';
        btn.onclick=()=>pickOpt(sub,oi,opt.score,maxSc);
        optsEl.appendChild(btn);
      });
      subEl.appendChild(optsEl);
      // 비고
      const memoWrap=document.createElement('div'); memoWrap.className='memo-wrap';
      const ta=document.createElement('textarea'); ta.className='memo';
      ta.placeholder='비고 (선택)'; ta.rows=2;
      ta.value=S.ans[sub.id]?.memo||'';
      ta.oninput=()=>{ ensureAns(sub.id); S.ans[sub.id].memo=ta.value; doSave(); };
      memoWrap.appendChild(ta); subEl.appendChild(memoWrap);
      sec.appendChild(subEl);
    });
    body.appendChild(sec);
  });
  body.scrollTop=0;
  refreshProgress();
}

function optCls(score,maxSc){
  if(score===maxSc&&score>0) return 'ok';
  if(score===0) return 'ng';
  return 'mid';
}
function ensureAns(id){
  if(!S.ans[id]) S.ans[id]={optionIdx:-1,score:0,memo:''};
}
function pickOpt(sub,oi,score,maxSc){
  sub.options.forEach((_,i)=>{
    const b=document.getElementById('opt-'+sub.id+'-'+i);
    if(b) b.className='opt';
  });
  const btn=document.getElementById('opt-'+sub.id+'-'+oi);
  if(btn) btn.classList.add(optCls(score,maxSc));
  ensureAns(sub.id);
  S.ans[sub.id].optionIdx=oi;
  S.ans[sub.id].score=score;
  refreshProgress();
  refreshTabs();
  doSave();
}

/* ════ 진행률 ════ */
function validSubs(){
  return CFG.checklist.flatMap(m=>m.items.flatMap(i=>i.subs))
    .filter(s=>!(s.id==='1-1-1'&&S.type==='정기'));
}
function curScore(){
  return Object.entries(S.ans).reduce((a,[id,v])=>{
    if(id==='1-1-1'&&S.type==='정기') return a;
    return a+(v.score||0);
  },0);
}
function maxScore(){
  return validSubs().reduce((a,s)=>a+Math.max(...s.options.map(o=>o.score)),0)||CFG.max_score||109;
}
function normScore(){
  const mx=maxScore(); return mx>0?Math.round(curScore()/mx*100):0;
}
function grade(pct){
  return (CFG?.grades||[]).find(g=>pct>=g.min&&pct<=g.max)||null;
}
function refreshProgress(){
  const subs=validSubs();
  const done=subs.filter(s=>S.ans[s.id]?.optionIdx>=0).length;
  const total=subs.length;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-txt').textContent=done+' / '+total+' 항목 완료';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  const cur=curScore(), mx=maxScore(), norm=normScore();
  document.getElementById('chip-score').textContent=cur+'/'+mx+'점 (환산 '+norm+'점)';
  const gr=grade(norm);
  const gc=document.getElementById('chip-grade');
  gc.textContent=gr?gr.grade+'등급·'+gr.label:'입력 중';
  gc.className='chip chip-grade '+(gr?'g-'+gr.grade:'g-none');
}
function refreshTabs(){
  CFG.checklist.forEach((maj,i)=>{
    const tab=document.getElementById('tab-'+i); if(!tab) return;
    const subs=maj.items.flatMap(it=>it.subs).filter(s=>!(s.id==='1-1-1'&&S.type==='정기'));
    const done=subs.filter(s=>S.ans[s.id]?.optionIdx>=0);
    const hasNg=subs.some(s=>{
      const a=S.ans[s.id]; if(!a||a.optionIdx<0) return false;
      return a.score<Math.max(...s.options.map(o=>o.score));
    });
    tab.classList.toggle('ng',hasNg);
    tab.classList.toggle('done',done.length===subs.length&&subs.length>0);
  });
}
function prevMaj(){ if(S.majIdx>0) renderMaj(S.majIdx-1); }
function nextMaj(){
  if(S.majIdx<CFG.checklist.length-1) renderMaj(S.majIdx+1);
  else buildResult();
}

/* ════ 결과 ════ */
function buildResult(){
  const body=document.getElementById('res-body'); body.innerHTML='';
  const cur=curScore(), mx=maxScore(), norm=normScore();
  const gr=grade(norm);
  document.getElementById('res-date').textContent=S.date.replace(/-/g,'.');
  // 히어로
  const hero=document.createElement('div'); hero.className='result-hero';
  hero.innerHTML='<div class="r-co">'+S.company.name+' · '+S.type+'</div>'
    +'<div class="r-score">'+norm+'</div>'
    +'<div class="r-raw">/ 100점 (원점수 '+cur+'/'+mx+'점)</div>'
    +'<div class="r-badge '+(gr?'g-'+gr.grade:'')+'" style="'+(gr?'':'background:rgba(255,255,255,.1)')+'">'+
    (gr?gr.grade+'등급 · '+gr.label:'등급 산출 불가')+'</div>'
    +'<div class="r-note">'+(gr?.note||'')+'</div>';
  body.appendChild(hero);
  // 대분류별
  const s1=makeSec('📊 대분류별 점수');
  CFG.checklist.forEach(maj=>{
    let g=0,m=0;
    maj.items.forEach(it=>it.subs.forEach(s=>{
      if(s.id==='1-1-1'&&S.type==='정기') return;
      m+=Math.max(...s.options.map(o=>o.score));
      g+=S.ans[s.id]?.score||0;
    }));
    const bp=m>0?Math.round(g/m*100):0;
    const bc=bp>=90?'var(--ok)':bp>=70?'var(--mid)':'var(--ng)';
    const row=document.createElement('div'); row.className='r-row';
    row.innerHTML='<div class="r-row-name">'+maj.id+'. '+maj.name+'</div>'
      +'<div class="r-bar-wrap"><div class="r-bar" style="width:'+bp+'%;background:'+bc+'"></div></div>'
      +'<div class="r-row-score">'+g+'/'+m+'점</div>';
    s1.appendChild(row);
  });
  body.appendChild(s1);
  // 지적사항
  const ngList=[];
  CFG.checklist.forEach(maj=>maj.items.forEach(it=>it.subs.forEach(s=>{
    if(s.id==='1-1-1'&&S.type==='정기') return;
    const a=S.ans[s.id]; if(!a||a.optionIdx<0) return;
    const mx=Math.max(...s.options.map(o=>o.score));
    if(a.score<mx) ngList.push({id:s.id,text:s.options[a.optionIdx].text,memo:a.memo||''});
  })));
  if(ngList.length>0){
    const s2=makeSec('⚠ 지적사항 ('+ngList.length+'건)');
    ngList.forEach(ng=>{
      const r=document.createElement('div'); r.className='ng-item';
      r.innerHTML='<div class="ng-tag">'+ng.id+'</div><div><div class="ng-txt">'+ng.text+'</div>'+(ng.memo?'<div class="ng-memo">📝 '+ng.memo+'</div>':'')+'</div>';
      s2.appendChild(r);
    });
    body.appendChild(s2);
  }
  // 미입력
  const miss=validSubs().filter(s=>!S.ans[s.id]||S.ans[s.id].optionIdx<0);
  if(miss.length>0){
    const s3=makeSec('❓ 미입력 항목 ('+miss.length+'건) — 탭하여 이동');
    miss.forEach(s=>{
      let majIdx=0;
      CFG.checklist.forEach((m,mi)=>m.items.forEach(it=>it.subs.forEach(ss=>{if(ss.id===s.id)majIdx=mi;})));
      const r=document.createElement('div'); r.className='miss-item';
      r.innerHTML='<div class="miss-dot"></div><div class="miss-txt">'+s.id+'</div><div class="miss-arr">→</div>';
      r.onclick=()=>{
        showScreen('sc-check');
        renderMaj(majIdx);
        setTimeout(()=>{
          const el=document.getElementById('sub-'+s.id);
          const cont=document.getElementById('chk-body');
          if(el&&cont){
            cont.scrollTo({top:el.offsetTop-cont.offsetTop-60,behavior:'smooth'});
            el.style.outline='2.5px solid var(--mid)';
            el.style.borderRadius='8px';
            setTimeout(()=>{el.style.outline='';},2500);
          }
        },300);
      };
      s3.appendChild(r);
    });
    body.appendChild(s3);
  }
  const sp=document.createElement('div'); sp.style.height='16px'; body.appendChild(sp);
  showScreen('sc-result');
}
function makeSec(title){
  const s=document.createElement('div'); s.className='r-sec';
  s.innerHTML='<div class="r-sec-title">'+title+'</div>';
  return s;
}

/* ════ 자동저장 ════ */
function doSave(){
  try{
    localStorage.setItem(DRAFT_KEY,JSON.stringify({
      company:S.company,date:S.date,type:S.type,inspector:S.inspector,
      majIdx:S.majIdx,ans:S.ans,savedAt:new Date().toISOString()
    }));
    showSaveInd();
  }catch(e){}
}
function clearDraft(){ localStorage.removeItem(DRAFT_KEY); }
function showSaveInd(){
  let el=document.getElementById('save-ind');
  if(!el){ el=document.createElement('div'); el.id='save-ind'; el.className='save-ind'; document.body.appendChild(el); }
  el.textContent='💾 자동저장됨'; el.style.display='block';
  clearTimeout(window._sit);
  window._sit=setTimeout(()=>{ el.style.display='none'; },1500);
}
function checkDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY); if(!raw) return;
    const d=JSON.parse(raw); if(!d.company||!d.date) return;
    const diff=Math.floor((Date.now()-new Date(d.savedAt))/60000);
    const ts=diff<60?diff+'분 전':Math.floor(diff/60)+'시간 '+diff%60+'분 전';
    const msg='📋 저장된 점검 작업이 있습니다.

협력사: '+d.company.name+'
점검일: '+d.date+'
점검자: '+(d.inspector||'-')+'
저장: '+ts+'

이어서 작업하시겠습니까?';
    if(window.confirm(msg)){
      S.company=d.company; S.date=d.date; S.type=d.type;
      S.inspector=d.inspector; S.majIdx=d.majIdx||0; S.ans=d.ans||{};
      // 기본정보 화면 복원
      const sel=document.getElementById('sel-co');
      CFG.companies.forEach((co,i)=>{ if(co.id===d.company.id) sel.value=i; });
      document.getElementById('inp-date').value=d.date;
      document.getElementById('inp-insp').value=d.inspector||'';
      document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===d.type));
      S.type=d.type;
      if(window.confirm('기본정보 화면에서 시작할까요?
(아니오: 점검 화면으로 바로 이동)')){
        showScreen('sc-info');
      }else{
        buildTabs(); renderMaj(S.majIdx); showScreen('sc-check');
      }
    }else{
      if(window.confirm('저장된 작업을 삭제할까요?')) clearDraft();
    }
  }catch(e){ localStorage.removeItem(DRAFT_KEY); }
}

// openModal('modal-exp') 호출 전 desc 세팅
document.getElementById('modal-exp').addEventListener('click',function(e){
  if(e.target===this) closeModal('modal-exp');
});
// btn-accent onclick을 openExportModal로 연결
document.querySelector('.btn-accent').onclick=function(){
  const cur=curScore(),mx=maxScore(),norm=normScore(),gr=grade(norm);
  const miss=validSubs().filter(s=>!S.ans[s.id]||S.ans[s.id].optionIdx<0).length;
  document.getElementById('exp-desc').innerHTML=
    '<strong>'+S.company.name+'</strong> · '+S.date+' · '+S.type+'<br>'
    +'원점수: <strong>'+cur+'/'+mx+'점</strong> → 환산 <strong>'+norm+'점</strong> <strong>'+(gr?gr.grade+'등급':'-')+'</strong>'
    +(miss>0?'<br>⚠ 미입력 '+miss+'항목 있음':'');
  openModal('modal-exp');
};
